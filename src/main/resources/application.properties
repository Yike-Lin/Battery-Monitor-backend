# 对象存储（MinIO）配置
bms.object-storage.endpoint=http://localhost:9000
bms.object-storage.access-key=minioadmin
bms.object-storage.secret-key=minioadmin
bms.object-storage.bucket=bms-csv
bms.object-storage.secure=false

# 文件大小限制
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# 实时量测 EMA 降噪（拓扑快照、列表 V/T、双通道流共用状态，按 cell_id 分片）
bms.signal-filter.enabled=true
bms.signal-filter.voltage-alpha=0.35
bms.signal-filter.temperature-alpha=0.30
bms.signal-filter.current-alpha=0.40
bms.signal-filter.max-delta-voltage=0.06
bms.signal-filter.max-delta-temperature=2.0
bms.signal-filter.max-delta-current=0.2
bms.signal-filter.stale-reset-seconds=120